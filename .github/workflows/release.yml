name: Build and Release Mobile Apps (Android & iOS)

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: |
          cd apps/mobile
          flutter pub get

      - name: Build Android APK
        run: |
          cd apps/mobile
          flutter build apk --release

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          files: apps/mobile/build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-ipa:
    runs-on: macos-14
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: |
          cd apps/mobile
          flutter pub get

      - name: Build iOS App (Unsigned IPA)
        run: |
          cd apps/mobile
          flutter build ipa --release --no-codesign

      - name: Package iOS Archive
        run: |
          cd apps/mobile/build/ios/archive
          zip -r Runner.xcarchive.zip Runner.xcarchive

      - name: Upload iOS Assets to Release
        uses: softprops/action-gh-release@v2
        with:
          files: apps/mobile/build/ios/archive/Runner.xcarchive.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

